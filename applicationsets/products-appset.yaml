apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: products
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # Axis 1: product registry — platform team adds one entry per product onboarding
          - list:
              elements:
                - product: product-helloapi
                  productRepoURL: https://github.com/miraccan00/product-helloapi-gitops.git
                # - product: product-b
                #   productRepoURL: https://github.com/miraccan00/product-b-gitops.git
          # Axis 2: environments — applies every product to every env automatically
          - list:
              elements:
                - env: dev
                - env: prod
  template:
    metadata:
      # e.g. "product-helloapi-dev", "product-b-prod"
      name: "{{ .product }}-{{ .env }}"
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: default
      source:
        repoURL: "{{ .productRepoURL }}"
        targetRevision: main
        # ArgoCD kustomization.yaml'ı görünce otomatik Kustomize kullanır.
        # Overlay: base chart/values.yaml + sadece env-spesifik overrides.
        path: "overlays/{{ .env }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .product }}-{{ .env }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false  # namespace is managed by namespaces-appset (wave -1)
